{
  "context.modules": [
    {
      "name": "libpipewire-module-filter-chain",
      "args": {
        "node.description": "High Pass Filter",
        "media.name": "High Pass Filter",
        "filter.graph": {
          "nodes": [
            {
              "type": "lv2",
              "name": "hpf",
              "plugin": "http://invadarecords.com/plugins/lv2/filter/hpf/stereo",
              "label": "hpf",
              "control": {
                "bypass": 1
              }
            },
          ],
        },
        "capture.props": {
          "node.name": "hpf_input",
          "media.class": "Audio/Sink",
          "audio.channels": 2,
          "audio.position": [
            "FL",
            "FR"
          ]
        },
        "playback.props": {
          "node.name": "hpf_output",
          "media.class": "Audio/Source",
          "audio.channels": 2,
          "audio.position": [
            "FL",
            "FR"
          ]
        }
      }
    }
  ]
}
