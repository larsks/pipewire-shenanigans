{
  "context.modules": [
    {
      "name": "libpipewire-module-filter-chain",
      "args": {
        "node.description": "Noise Repellent Stereo",
        "media.name": "Noise Repellent Stereo",
        "filter.graph": {
          "nodes": [
            {
              "type": "lv2",
              "name": "nr",
              "plugin": "https://github.com/lucianodato/noise-repellent-stereo#new",
              "label": "noise-repellent-stereo",
              "control": {
                "adaptive_noise": 1,
                "adaptive_method": 0,
                "tonal_reduction": 50.0,
                "smoothing": 30
              }
            },
            {
              "type": "builtin",
              "name": "gain_L",
              "label": "mixer",
              "control": {
                "Gain 1": 4.0
              }
            },
            {
              "type": "builtin",
              "name": "gain_R",
              "label": "mixer",
              "control": {
                "Gain 1": 4.0
              }
            }
          ],
          "inputs": [
            "nr:input_1",
            "nr:input_2"
          ],
          "outputs": [
            "gain_L:Out",
            "gain_R:Out"
          ],
          "links": [
            {
              "output": "nr:output_1",
              "input": "gain_L:In 1"
            },
            {
              "output": "nr:output_2",
              "input": "gain_R:In 1"
            }
          ]
        },
        "capture.props": {
          "node.name": "nr_input",
          "media.class": "Audio/Sink",
          "audio.channels": 2,
          "audio.position": [
            "FL",
            "FR"
          ]
        },
        "playback.props": {
          "node.name": "nr_output",
          "media.class": "Audio/Source",
          "audio.channels": 2,
          "audio.position": [
            "FL",
            "FR"
          ]
        }
      }
    }
  ]
}
