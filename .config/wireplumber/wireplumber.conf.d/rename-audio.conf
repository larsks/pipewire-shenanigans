{
  "monitor.alsa.rules": [
    {
      "matches": [
        {
          "node.name": "alsa_output.usb-Burr-Brown_from_TI_USB_Audio_CODEC-00.analog-stereo-output"
        }
      ],
      "actions": {
        "update-props": {
          "node.nick": "ucontrol-out",
          "node.name": "ucontrol-out"
        }
      }
    },
    {
      "matches": [
        {
          "node.name": "alsa_input.usb-Burr-Brown_from_TI_USB_Audio_CODEC-00.analog-stereo-input"
        }
      ],
      "actions": {
        "update-props": {
          "node.nick": "ucontrol-in",
          "node.name": "ucontrol-in"
        }
      }
    },
    {
      "matches": [
        {
          "node.name": "~alsa_output.platform-3f902000.hdmi.hdmi-stereo.*"
        }
      ],
      "actions": {
        "update-props": {
          "node.nick": "system",
          "node.name": "system"
        }
      }
    },
    {
      "matches": [
        {
          "node.name": "alsa_output.usb-Focusrite_Scarlett_2i2_USB-00.analog-stereo"
        }
      ],
      "actions": {
        "update-props": {
          "node.nick": "scarlett-out",
          "node.name": "scarlett-out"
        }
      }
    },
    {
      "matches": [
        {
          "node.name": "alsa_input.usb-Focusrite_Scarlett_2i2_USB-00.analog-stereo"
        }
      ],
      "actions": {
        "update-props": {
          "node.nick": "scarlett-in",
          "node.name": "scarlett-in"
        }
      }
    },
    {
      "matches": [
        {
          "node.name": "alsa_output.platform-fe00b840.mailbox.stereo-fallback"
        }
      ],
      "actions": {
        "update-props": {
          "node.nick": "system",
          "node.name": "system"
        }
      }
    }
  ]
}
